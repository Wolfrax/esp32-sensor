<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.png" type="image/png">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ee;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --ok: #059669;
      --warn: #b45309;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-group h1 {
      margin: 0;
      font-size: 2rem;
    }

    .title-group p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      background: var(--accent);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid.top {
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      margin-bottom: 20px;
    }

    .grid.info {
      grid-template-columns: repeat(5, minmax(160px, 1fr));
      margin-bottom: 20px;
    }

    .charts {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card h2,
    .card h3 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .subtle {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .node-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .node-item .label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .node-item .value {
      font-weight: bold;
      word-break: break-word;
    }

    .extreme-list {
      display: grid;
      gap: 12px;
    }

    .extreme-row {
      padding: 10px 12px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .extreme-row strong {
      display: block;
      margin-bottom: 4px;
    }

    .chart-card canvas {
      width: 100% !important;
      height: 320px !important;
    }

    .status-pill {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    @media (max-width: 1100px) {
      .grid.top,
      .grid.info {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }

    @media (max-width: 700px) {
      .grid.top,
      .grid.info {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="title-group">
        <h1>{{TITLE}}</h1>
        <p>Live and historical readings</p>
      </div>
      <div class="nav-links">
        <a href="./?title={{TITLE}}">Dashboard</a>
        <a href="debug.html">Debug</a>
      </div>
    </div>

    <div class="grid info">
      <div class="card node-item">
        <div class="label">Start Time</div>
        <div class="value" id="starttime">-</div>
      </div>
      <div class="card node-item">
        <div class="label">MAC Address</div>
        <div class="value" id="macaddr">-</div>
      </div>
      <div class="card node-item">
        <div class="label">IP Address</div>
        <div class="value" id="ipaddr">-</div>
      </div>
      <div class="card node-item">
        <div class="label">Hostname</div>
        <div class="value" id="hostname">-</div>
      </div>
      <div class="card node-item">
        <div class="label">WiFi SSID</div>
        <div class="value" id="wifiStatus">-</div>
      </div>
    </div>

    <div class="grid top">
      <div class="card">
        <div class="metric-label">Latest Temperature</div>
        <div class="metric-value" id="latestTemp">-</div>
        <div class="subtle" id="latestTimeTemp">-</div>
      </div>

      <div class="card">
        <div class="metric-label">Latest Humidity</div>
        <div class="metric-value" id="latestHum">-</div>
        <div class="subtle" id="latestTimeHum">-</div>
      </div>

      <div class="card">
        <div class="metric-label">Latest Pressure</div>
        <div class="metric-value" id="latestPress">-</div>
        <div class="subtle" id="latestTimePress">-</div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:10px;">Status</h3>
        <div class="status-pill" id="liveStatus">Connecting…</div>
        <div class="subtle" style="margin-top:10px;">
          Samples loaded: <span id="sampleCount">0</span>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <h3>Extreme Values</h3>
      <div class="extreme-list" id="extremes">Loading…</div>
    </div>

    <div class="charts">
      <div class="card chart-card">
        <h3>Temperature</h3>
        <canvas id="tempChart"></canvas>
      </div>

      <div class="card chart-card">
        <h3>Humidity</h3>
        <canvas id="humChart"></canvas>
      </div>

      <div class="card chart-card">
        <h3>Air Pressure</h3>
        <canvas id="pressChart"></canvas>
      </div>
    </div>
  </div>

<script>
  window.addEventListener("beforeunload", () => {
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }
  });

  let tempChart, humChart, pressChart;
  let sensorData = [];
  let eventSource = null;
  let sseConnected = false;

  function formatTime(ts) {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return ts;
    return d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0") + " " +
      String(d.getHours()).padStart(2, "0") + ":" +
      String(d.getMinutes()).padStart(2, "0") + ":" +
      String(d.getSeconds()).padStart(2, "0");
  }

  function normalizeSample(sample) {
    return {
      ts: sample.ts,
      t: Number(sample.t),
      h: Number(sample.h),
      p: Number(sample.p)
    };
  }

  function isValidSample(sample) {
    return sample &&
      typeof sample.ts === "string" &&
      !isNaN(sample.t) &&
      !isNaN(sample.h) &&
      !isNaN(sample.p);
  }

  function isSameSample(a, b) {
    return !!a && !!b &&
      a.ts === b.ts &&
      Number(a.t) === Number(b.t) &&
      Number(a.h) === Number(b.h) &&
      Number(a.p) === Number(b.p);
  }

  async function fetchData() {
    const res = await fetch("data");
    if (!res.ok) throw new Error(`fetchData failed: HTTP ${res.status}`);

    const json = await res.json();
    if (!json.data) return [];

    return json.data
      .map(normalizeSample)
      .filter(isValidSample)
      .sort((a, b) => new Date(a.ts) - new Date(b.ts));
  }

  async function fetchNodeInfo() {
    try {
      const res = await fetch("get_node");
      if (!res.ok) throw new Error(`fetchNodeInfo failed: HTTP ${res.status}`);

      const json = await res.json();
      if (!json.node) return;

      document.getElementById("starttime").textContent = json.node.starttime || "-";
      document.getElementById("macaddr").textContent = json.node.mac || "-";
      document.getElementById("ipaddr").textContent = json.node.ip || "-";
      document.getElementById("hostname").textContent = json.node.name || "-";
      document.getElementById("wifiStatus").textContent = json.node.ssid || "-";
    } catch (err) {
      console.error("fetchNodeInfo failed:", err);
    }
  }

  function updateLatest(data) {
    if (!data.length) return;

    const last = data[data.length - 1];
    const timeText = formatTime(last.ts);

    document.getElementById("latestTemp").textContent = `${last.t.toFixed(1)} °C`;
    document.getElementById("latestHum").textContent = `${last.h.toFixed(1)} %`;
    document.getElementById("latestPress").textContent = `${last.p.toFixed(1)} hPa`;

    document.getElementById("latestTimeTemp").textContent = timeText;
    document.getElementById("latestTimeHum").textContent = timeText;
    document.getElementById("latestTimePress").textContent = timeText;

    document.getElementById("sampleCount").textContent = data.length;
  }

  function updateExtremes(data) {
    if (!data.length) return;

    let minT = data[0], maxT = data[0];
    let minH = data[0], maxH = data[0];
    let minP = data[0], maxP = data[0];

    for (const d of data) {
      if (d.t < minT.t) minT = d;
      if (d.t > maxT.t) maxT = d;
      if (d.h < minH.h) minH = d;
      if (d.h > maxH.h) maxH = d;
      if (d.p < minP.p) minP = d;
      if (d.p > maxP.p) maxP = d;
    }

    document.getElementById("extremes").innerHTML = `
      <div class="extreme-row">
        <strong>Temperature</strong>
        Min: ${minT.t.toFixed(1)} °C at ${formatTime(minT.ts)}<br>
        Max: ${maxT.t.toFixed(1)} °C at ${formatTime(maxT.ts)}
      </div>
      <div class="extreme-row">
        <strong>Humidity</strong>
        Min: ${minH.h.toFixed(1)} % at ${formatTime(minH.ts)}<br>
        Max: ${maxH.h.toFixed(1)} % at ${formatTime(maxH.ts)}
      </div>
      <div class="extreme-row">
        <strong>Air Pressure</strong>
        Min: ${minP.p.toFixed(1)} hPa at ${formatTime(minP.ts)}<br>
        Max: ${maxP.p.toFixed(1)} hPa at ${formatTime(maxP.ts)}
      </div>
    `;
  }

  function buildChart(canvasId, label, data, yTitle) {
    return new Chart(document.getElementById(canvasId), {
      type: "line",
      data: {
        labels: sensorData.map(d => formatTime(d.ts)),
        datasets: [{
          label,
          data,
          pointRadius: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: {
          mode: "index",
          intersect: false
        },
        plugins: {
          legend: {
            display: true
          }
        },
        scales: {
          x: {
            ticks: {
              maxTicksLimit: 10
            }
          },
          y: {
            title: {
              display: true,
              text: yTitle
            }
          }
        }
      }
    });
  }

  function createCharts() {
    if (tempChart) tempChart.destroy();
    if (humChart) humChart.destroy();
    if (pressChart) pressChart.destroy();

    tempChart = buildChart("tempChart", "Temperature", sensorData.map(d => d.t), "°C");
    humChart = buildChart("humChart", "Humidity", sensorData.map(d => d.h), "%");
    pressChart = buildChart("pressChart", "Air Pressure", sensorData.map(d => d.p), "hPa");
  }

  function refreshCharts() {
    const labels = sensorData.map(d => formatTime(d.ts));

    if (tempChart) {
      tempChart.data.labels = labels;
      tempChart.data.datasets[0].data = sensorData.map(d => d.t);
      tempChart.update();
    }

    if (humChart) {
      humChart.data.labels = labels;
      humChart.data.datasets[0].data = sensorData.map(d => d.h);
      humChart.update();
    }

    if (pressChart) {
      pressChart.data.labels = labels;
      pressChart.data.datasets[0].data = sensorData.map(d => d.p);
      pressChart.update();
    }
  }

  function setLiveStatus(text) {
    document.getElementById("liveStatus").textContent = text;
  }

  function addLiveSample(sample) {
    const normalized = normalizeSample(sample);

    if (!isValidSample(normalized)) {
      console.warn("Invalid live sample:", sample);
      return;
    }

    const last = sensorData.length ? sensorData[sensorData.length - 1] : null;
    if (isSameSample(last, normalized)) {
      return;
    }

    sensorData.push(normalized);
    sensorData.sort((a, b) => new Date(a.ts) - new Date(b.ts));

    updateLatest(sensorData);
    updateExtremes(sensorData);
    refreshCharts();
  }

  function startSSE() {
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }

    sseConnected = false;
    setLiveStatus("Connecting…");

    eventSource = new EventSource("events");

    eventSource.addEventListener("sample", (e) => {
      try {
        const sample = JSON.parse(e.data);
        addLiveSample(sample);

        if (!sseConnected) {
          sseConnected = true;
          setLiveStatus("Live");
        }
      } catch (err) {
        console.error("Failed to parse SSE sample:", err, e.data);
      }
    });

    eventSource.onopen = () => {
      sseConnected = true;
      setLiveStatus("Live");
    };

    eventSource.onerror = (e) => {
      sseConnected = false;
      console.error("SSE connection error", e);
      setLiveStatus("Reconnecting…");
    };
  }

  async function initDashboard() {
    try {
      await fetchNodeInfo();
      sensorData = await fetchData();

      if (sensorData.length) {
        updateLatest(sensorData);
        updateExtremes(sensorData);
        createCharts();
      } else {
        document.getElementById("extremes").textContent = "No data available.";
        setLiveStatus("Waiting for data");
        createCharts();
      }

      startSSE();
    } catch (err) {
      console.error("initDashboard failed:", err);
      setLiveStatus("Error");
    }
  }

  initDashboard();
  setInterval(fetchNodeInfo, 30000);
</script>
</body>
</html>
